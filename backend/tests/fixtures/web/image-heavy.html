<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Image Heavy Article | Example Site</title>
  </head>
  <body>
    <main>
      <article>
        <h1>Image Heavy Article</h1>
        <p>This article contains several large visuals that should survive filtering.</p>
        <figure>
          <img src="/images/hero.png" alt="Hero image" width="1600" height="900" />
          <figcaption>Hero image for the opening section.</figcaption>
        </figure>
        <p>Chart section introduces supporting data.</p>
        <figure>
          <img src="/images/chart-a.png" alt="Trend chart" width="1280" height="720" />
          <figcaption>Trend chart with a clear axis and labels.</figcaption>
        </figure>
        <figure>
          <img src="/images/icon.png" alt="Decorative icon" width="32" height="32" />
          <figcaption>Small decorative icon.</figcaption>
        </figure>
        <p>Closing notes summarize the visual story.</p>
      </article>
    </main>
  </body>
</html>
